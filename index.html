<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lower Body Strength Workout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --card: #fffdf9;
    --border-neutral: #efe9e0;
    --border-rose: #e8cdd1;
    --navy: #3d4654;
    --muted: #7a8496;
    --gold: #c2a265;
    --rose: #b76e79;
    --shadow: rgba(61, 70, 84, 0.07) 0px 2px 24px 0px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Jost", "Segoe UI", system-ui, sans-serif;
    background-color: var(--cream);
    color: var(--navy);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 2.5rem 1rem;
  }
  .container {
    background: var(--card);
    padding: 2.25rem 2rem 2rem;
    border-radius: 18px;
    border: 1px solid var(--border-neutral);
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .eyebrow {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 0.4rem;
  }
  h1 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 1.9rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin: 0 0 0.9rem;
    color: var(--navy);
  }
  .divider {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 1.1rem;
    position: relative;
  }
  .divider::after {
    content: "";
    position: absolute;
    left: 50%;
    top: -3px;
    transform: translateX(-50%) rotate(45deg);
    width: 6px;
    height: 6px;
    background: var(--gold);
  }
  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1.1rem;
    letter-spacing: 0.02em;
  }
  .progress-bar-track {
    background: var(--border-neutral);
    border-radius: 6px;
    height: 7px;
    width: 100%;
    overflow: hidden;
    margin-bottom: 1.4rem;
  }
  .progress-bar-fill {
    background: var(--rose);
    height: 100%;
    width: 0%;
    transition: width 0.3s ease;
  }
  .status {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 0.5rem;
  }
  h2 {
    font-family: "Cormorant Garamond", Georgia, serif;
    margin: 0 0 0.2rem;
    color: var(--navy);
    font-size: 1.5rem;
    font-weight: 600;
  }
  .reps {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
  .ring-wrap {
    position: relative;
    width: 210px;
    height: 210px;
    margin: 1rem auto;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border-neutral); stroke-width: 9; }
  .ring-progress {
    fill: none;
    stroke: var(--rose);
    stroke-width: 9;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
  }
  .timer-display {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 2.6rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--navy);
  }
  .controls { margin-top: 0.5rem; }
  .btn {
    background-color: transparent;
    color: var(--rose);
    border: 1px solid var(--border-rose);
    padding: 0.7rem 1.8rem;
    font-family: "Jost", sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-radius: 999px;
    cursor: pointer;
    transition: background-color 0.2s, color 0.2s;
  }
  .btn:hover { background-color: var(--rose); color: var(--card); }
  .btn-secondary {
    color: var(--muted);
    border: 1px solid var(--border-neutral);
    margin-left: 0.5rem;
  }
  .btn-secondary:hover { background-color: var(--muted); color: var(--card); border-color: var(--muted); }
  .btn-row { display: flex; justify-content: center; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
  .exercise-list {
    text-align: left;
    margin-top: 1.9rem;
    border-top: 1px solid var(--border-neutral);
    padding-top: 1.1rem;
  }
  .exercise-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.65rem 0.6rem;
    font-size: 0.92rem;
    color: var(--navy);
    border-radius: 10px;
  }
  .exercise-item.done { color: var(--muted); text-decoration: line-through; }
  .exercise-item.active-ex {
    font-weight: 600;
    color: var(--rose);
    background: #fbf1f1;
  }
  .check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid var(--border-rose);
    display: inline-block;
    flex-shrink: 0;
  }
  .exercise-item.done .check {
    background: var(--gold);
    border-color: var(--gold);
  }
  .settings-toggle {
    margin-top: 1.6rem;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    text-decoration: underline;
    background: none; border: none;
    font-family: "Jost", sans-serif;
    letter-spacing: 0.03em;
  }
  .settings-panel {
    display: none;
    text-align: left;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-neutral);
  }
  .settings-panel.open { display: block; }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.6rem;
    font-size: 0.88rem;
    color: var(--navy);
  }
  .settings-row input[type="number"] {
    width: 70px;
    padding: 0.3rem 0.5rem;
    border: 1px solid var(--border-neutral);
    border-radius: 8px;
    text-align: center;
    font-family: "Jost", sans-serif;
    background: var(--cream);
    color: var(--navy);
  }
  .footer-note {
    margin-top: 1.6rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow">Weekly Training Ritual</div>
  <h1>Lower Body Strength</h1>
  <div class="divider"></div>
  <div class="subtitle" id="round-label">Exercise 1 of 4</div>

  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>

  <div class="status" id="status-text">Set 1 of 3 &middot; Work</div>
  <h2 id="exercise-title">1. Goblet Squats</h2>
  <div class="reps" id="exercise-reps">12 reps</div>

  <div class="ring-wrap">
    <svg width="210" height="210">
      <circle class="ring-bg" cx="105" cy="105" r="96"></circle>
      <circle class="ring-progress" id="ring" cx="105" cy="105" r="96"></circle>
    </svg>
    <div class="timer-display" id="time-display">00:45</div>
  </div>

  <div class="btn-row">
    <button class="btn" id="start-btn" onclick="toggleTimer()">Start</button>
    <button class="btn btn-secondary" onclick="skipPhase()">Skip</button>
    <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
  </div>

  <div class="exercise-list" id="exercise-list"></div>

  <button class="settings-toggle" onclick="toggleSettings()">Edit workout settings</button>
  <div class="settings-panel" id="settings-panel">
    <div class="settings-row"><span>Work time (sec)</span><input type="number" id="work-input" min="5" step="5"></div>
    <div class="settings-row"><span>Rest time (sec)</span><input type="number" id="rest-input" min="5" step="5"></div>
    <div class="settings-row"><span>Sets per exercise</span><input type="number" id="sets-input" min="1" step="1"></div>
    <div class="settings-row"><span>Sound alerts</span>
      <input type="checkbox" id="sound-input" checked>
    </div>
    <div class="btn-row"><button class="btn" onclick="applySettings()">Apply &amp; Reset</button></div>
  </div>

  <div class="footer-note">Tap Start to begin &middot; progress resets on refresh</div>
</div>

<script>
  // ---- Config (mutable via settings panel) ----
  let WORK_TIME = 45;
  let REST_TIME = 45;
  let TOTAL_SETS = 3;
  let SOUND_ON = true;

  const exercises = [
    { name: "1. Goblet Squats", reps: "12 reps" },
    { name: "2. Reverse Lunges", reps: "10 reps/leg" },
    { name: "3. Glute Bridges", reps: "15 reps, 2s hold" },
    { name: "4. Clamshells / Band Walks", reps: "15 reps/side" }
  ];

  let currentExerciseIndex = 0;
  let currentSet = 1;
  let isWorking = true;
  let timeLeft = WORK_TIME;
  let timerInterval = null;
  let isRunning = false;

  const RING_CIRCUMFERENCE = 2 * Math.PI * 96;

  function renderExerciseList() {
    const list = document.getElementById('exercise-list');
    list.innerHTML = '';
    exercises.forEach((ex, i) => {
      const item = document.createElement('div');
      item.className = 'exercise-item';
      item.id = `ex-${i}`;
      if (i < currentExerciseIndex) item.classList.add('done');
      if (i === currentExerciseIndex) item.classList.add('active-ex');
      item.innerHTML = `<span>${ex.name} (${ex.reps})</span><span class="check"></span>`;
      list.appendChild(item);
    });
  }

  function updateDOM() {
    const minutes = Math.floor(timeLeft / 60).toString().padStart(2, '0');
    const seconds = (timeLeft % 60).toString().padStart(2, '0');
    document.getElementById('time-display').innerText = `${minutes}:${seconds}`;

    const ex = exercises[currentExerciseIndex];
    document.getElementById('exercise-title').innerText = ex.name;
    document.getElementById('exercise-reps').innerText = ex.reps;
    document.getElementById('round-label').innerText =
      `Exercise ${currentExerciseIndex + 1} of ${exercises.length}`;

    const statusEl = document.getElementById('status-text');
    const ring = document.getElementById('ring');
    const total = isWorking ? WORK_TIME : REST_TIME;
    const fraction = total > 0 ? timeLeft / total : 0;
    ring.style.strokeDasharray = RING_CIRCUMFERENCE;
    ring.style.strokeDashoffset = RING_CIRCUMFERENCE * (1 - fraction);

    if (isWorking) {
      statusEl.innerText = `Set ${currentSet} of ${TOTAL_SETS} · Work`;
      statusEl.style.color = "var(--rose)";
      ring.style.stroke = "#b76e79";
    } else {
      statusEl.innerText = `Set ${currentSet} of ${TOTAL_SETS} · Rest`;
      statusEl.style.color = "var(--gold)";
      ring.style.stroke = "#c2a265";
    }

    // overall progress bar across whole workout
    const totalPhases = exercises.length * TOTAL_SETS * 2;
    const phasesDone = currentExerciseIndex * TOTAL_SETS * 2 +
      (currentSet - 1) * 2 + (isWorking ? 0 : 1);
    const pct = Math.min(100, (phasesDone / totalPhases) * 100);
    document.getElementById('progress-bar').style.width = pct + '%';

    for (let i = 0; i < exercises.length; i++) {
      const item = document.getElementById(`ex-${i}`);
      item.classList.remove('active-ex', 'done');
      if (i < currentExerciseIndex) item.classList.add('done');
      if (i === currentExerciseIndex) item.classList.add('active-ex');
    }
  }

  function beep() {
    if (!SOUND_ON) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      osc.start();
      osc.stop(ctx.currentTime + 0.15);
    } catch (e) { /* audio not available */ }
    if (navigator.vibrate) navigator.vibrate(150);
  }

  function toggleTimer() {
    if (isRunning) {
      clearInterval(timerInterval);
      document.getElementById('start-btn').innerText = 'Start';
      isRunning = false;
    } else {
      document.getElementById('start-btn').innerText = 'Pause';
      isRunning = true;
      timerInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft < 0) {
          handlePhaseChange();
        }
        updateDOM();
      }, 1000);
    }
  }

  function skipPhase() {
    handlePhaseChange();
    updateDOM();
  }

  function handlePhaseChange() {
    beep();
    if (isWorking) {
      isWorking = false;
      timeLeft = REST_TIME;
    } else {
      isWorking = true;
      timeLeft = WORK_TIME;
      currentSet++;

      if (currentSet > TOTAL_SETS) {
        currentSet = 1;
        currentExerciseIndex++;
        if (currentExerciseIndex >= exercises.length) {
          clearInterval(timerInterval);
          isRunning = false;
          document.getElementById('start-btn').innerText = 'Start';
          currentExerciseIndex = exercises.length - 1;
          updateDOM();
          document.getElementById('progress-bar').style.width = '100%';
          setTimeout(() => alert("Workout complete! Great job! 💪"), 100);
          resetTimer();
          return;
        }
      }
    }
  }

  function resetTimer() {
    clearInterval(timerInterval);
    isRunning = false;
    currentExerciseIndex = 0;
    currentSet = 1;
    isWorking = true;
    timeLeft = WORK_TIME;
    document.getElementById('start-btn').innerText = 'Start';
    renderExerciseList();
    updateDOM();
  }

  function toggleSettings() {
    document.getElementById('settings-panel').classList.toggle('open');
  }

  function applySettings() {
    WORK_TIME = parseInt(document.getElementById('work-input').value, 10) || 45;
    REST_TIME = parseInt(document.getElementById('rest-input').value, 10) || 45;
    TOTAL_SETS = parseInt(document.getElementById('sets-input').value, 10) || 3;
    SOUND_ON = document.getElementById('sound-input').checked;
    resetTimer();
  }

  // init settings panel values
  document.getElementById('work-input').value = WORK_TIME;
  document.getElementById('rest-input').value = REST_TIME;
  document.getElementById('sets-input').value = TOTAL_SETS;
  document.getElementById('sound-input').checked = SOUND_ON;

  renderExerciseList();
  updateDOM();
</script>
</body>
</html>
